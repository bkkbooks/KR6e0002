  - {type: variant, offset: 11370, length: 263, content: 量中解一、一不礙無量，雖無量而一、雖一而無量，無量一、一無量。無量一非一、一無量非無量，非一非無量，方便一無量。問：若使本迹多一、一多無礙，既本一而迹多，何不迹一而本多？解云：例如前所明，而今一往開本迹。本一迹多者，本是體故一，迹是隨緣故無量。又本為一大緣故一，迹為緣不同故無量。本迹佛既然，本迹土亦爾。知此本迹土，見此本迹也。言不知不見者，凡有三意：一者約前明知本是迹本、知迹是本迹，見本是迹本、見迹是本迹。本迹既然，淨穢亦爾。今知無所知見、無所見知，淨穢宛然而未曾知淨穢，見淨穢宛然而未曾見淨穢。只見淨穢宛然而未曾淨穢，如石室佛影譬，遙望相好宛然，至邊一無所見，故言不知不見也。次意言不知不見者，二乘不知本是迹本, 甲: ''}
